version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Port / domain map (what to put in Cloudflare Tunnel):
#
#   Service              Local port   Cloudflare hostname (example)
#   ─────────────────    ──────────   ───────────────────────────────────────
#   Upload API           3001         https://api.yourdomain.com
#   MinIO S3 API         9000         https://storage.yourdomain.com   ← REQUIRED
#   MinIO Console        9001         https://minio-console.yourdomain.com (optional)
#   Hasura               8080         https://hasura.yourdomain.com    (optional)
#
# CRITICAL: MinIO must know its public URL (MINIO_SERVER_URL) so that the
# presigned PUT/GET URLs it generates contain "storage.yourdomain.com" and not
# "localhost:9000". Without this the frontend cannot reach MinIO externally.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── Upload microservice ──────────────────────────────────────────────────
  minio-upload-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: minio-upload-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      API_KEY: ${API_KEY}

      # Internal Docker network address — used for bucket verification & statObject
      S3_ENDPOINT: minio
      S3_PORT: "9000"
      S3_USE_SSL: "false"
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-files}

      # PUBLIC MinIO URL — presigned URLs will contain this hostname.
      # The frontend hits this URL directly when uploading/downloading.
      # Must match the Cloudflare Tunnel hostname for MinIO (port 9000).
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://storage.yourdomain.com}

      PRESIGNED_URL_EXPIRY_SECONDS: "900"
      MAX_FILE_SIZE_BYTES: "104857600"

      HASURA_GRAPHQL_URL: http://hasura:8080/v1/graphql
      HASURA_ADMIN_SECRET: ${HASURA_ADMIN_SECRET}
    networks:
      - app_network
    depends_on:
      - minio
      - hasura
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── MinIO ────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API  → tunnel to storage.yourdomain.com
      - "9001:9001"   # Console → tunnel to minio-console.yourdomain.com (optional)
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # THIS IS THE CRITICAL SETTING:
      # MinIO uses this URL when generating presigned URLs.
      # Set it to whatever Cloudflare Tunnel hostname points at port 9000.
      MINIO_SERVER_URL: ${S3_PUBLIC_URL:-https://storage.yourdomain.com}
      # Allows the console to work behind a reverse proxy / tunnel
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-https://minio-console.yourdomain.com}
    command: server /data --console-address ":9001"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Hasura ───────────────────────────────────────────────────────────────
  hasura:
    image: hasura/graphql-engine:v2.36.0
    container_name: hasura
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-appdb}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "false"
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET}
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ─── Cloudflare Tunnel ────────────────────────────────────────────────────
  # This container establishes an outbound-only tunnel to Cloudflare.
  # No inbound ports need to be opened on your firewall/router.
  #
  # Setup steps (one-time, on the host):
  #   1. Install cloudflared:  https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/downloads/
  #   2. Login:                cloudflared tunnel login
  #   3. Create tunnel:        cloudflared tunnel create my-app
  #      → Saves credentials JSON to ~/.cloudflared/<TUNNEL_ID>.json
  #   4. Copy credentials:     cp ~/.cloudflared/<TUNNEL_ID>.json ./cloudflared/credentials.json
  #   5. Edit cloudflared/config.yml with your tunnel ID and hostnames
  #   6. Add DNS records:      cloudflared tunnel route dns my-app api.yourdomain.com
  #                            cloudflared tunnel route dns my-app storage.yourdomain.com
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    networks:
      - app_network
    depends_on:
      - minio-upload-service
      - minio

volumes:
  minio_data:
  postgres_data:

networks:
  app_network:
    driver: bridge
